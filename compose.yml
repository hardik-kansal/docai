name: project1

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # postgres_data is just volume name
      # in real, pg stores data here /var/lib/postgresql/data
    ports:
      - "5432:5432"
    # health check is not one time setup, runs in bg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"] # use container cmd
      # pg_isready is pg tool to check server status
      interval: 10s # check every
      timeout: 5s  # time to respond for server
      retries: 5  # if not respond, retires
      start_period: 5s # this check starts after 10s

  redis:
    # if url not given, consider it default
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    # command tells to run this only
    # not default boot up which saves redis data to disk temporaly
    # lost if volume not set
    # > is just so that we can write commands in multiple lines
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.9.7 
    # latest version images are breaking for payload filters
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" 
    volumes:
      - qdrant_data:/qdrant/storage
    
  minio:
    image: minio/minio:latest
    container_name: local_minio
    ports:
      - "9000:9000" # s3 storage server with full aws like apis
      - "9001:9001" # admin only ui
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}      
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}  
      MINIO_NOTIFY_WEBHOOK_ENABLE_FASTAPI: ${MINIO_NOTIFY_WEBHOOK_ENABLE_FASTAPI}
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_FASTAPI: ${MINIO_NOTIFY_WEBHOOK_ENDPOINT_FASTAPI}
      MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_FASTAPI: ${MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_FASTAPI}

    volumes:
      - minio_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # if docker container wants to send to local pc url
    command: server /data --console-address ":9001"
    # this is imp to tell its role as server else crash

  api:
    build:
    # either build or look for image to pull
    # if build, then first check cache if already build in another service
      context: .
      target: runner
    container_name: api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

    healthcheck:
      disable: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:


# volumes-

#   mounting means create a folder which now points to 
#   a folder which is created and used inside a container,
#   so if that conatainer stops, that folder is not deleted.

#   - path -> mount to this path of container directory, 
#   and docker creates a random volume name which manages a folder 
#   poiting to that path

#   - system path:container path tell docker the folder which exits on our system 
#   (if doesnt creates it) and mount this folder to container path

#   - volume name:path but add volume at last of compose file, 
#   means create a volumne with this name, 
#   and which mangaes a folder which points to folder used inside container
