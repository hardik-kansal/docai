name: project1

services:

  redis:
    # if url not given, consider it default
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    # command tells to run this only
    # not default boot up which saves redis data to disk temporaly
    # lost if volume not set
    # > is just so that we can write commands in multiple lines
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # never in production fastapi is running on same network can access it
    # but must not be open to public internet
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    image: hardikkansal/docai-api:v1
    container_name: api
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true

  celery:
    image: hardikkansal/docai-api:v1
    container_name: celery
    restart: unless-stopped
    env_file:
      - .env
    command: ["celery", "-A", "backend.ingestion.worker:celery_app", "worker","-E","-Q","ingestion","-l","info", "--concurrency=1", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: hardikkansal/docai-frontend:v1
    container_name: frontend
    restart: unless-stopped
    env_file:
      - .env

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80" 
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - api
      - frontend

  certbot:
    image: certbot/certbot
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  redis_data:


